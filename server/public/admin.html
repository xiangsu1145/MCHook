<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCHook - 管理面板</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="card">
    <div class="nav-bar">
      <h2>管理面板</h2>
      <button onclick="logout()" style="background: #666;">退出登录</button>
    </div>

    <div id="login-section" class="hidden">
      <h1 style="margin-bottom:20px;">管理员登录</h1>
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="admin-username" placeholder="输入用户名">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="admin-password" placeholder="输入密码">
      </div>
      <button onclick="adminLogin()">登录</button>
      <div id="admin-error" class="error"></div>
    </div>

    <div id="admin-section" class="hidden">
      <h3 class="section-title">生成密钥</h3>
      <div class="grid-2">
        <div class="form-group">
          <label>密钥类型</label>
          <select id="key-type" style="width:100%;padding:14px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;" onchange="toggleDaysInput()">
            <option value="permanent">永久</option>
            <option value="trial">试用</option>
          </select>
        </div>
        <div class="form-group" id="days-group">
          <label>天数（试用）</label>
          <input type="number" id="key-days" value="7" min="1" max="365">
        </div>
      </div>
      <button onclick="generateKey()">生成密钥</button>
      <div id="generated-key" class="success" style="margin-top:15px;font-size:16px;font-weight:600;"></div>

      <h3 class="section-title">密钥管理</h3>
      <table>
        <thead>
          <tr>
            <th>密钥</th>
            <th>类型</th>
            <th>过期时间</th>
            <th>使用者</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="keys-table"></tbody>
      </table>

      <h3 class="section-title">用户管理</h3>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>用户名</th>
            <th>角色</th>
            <th>激活状态</th>
            <th>注册时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="users-table"></tbody>
      </table>
    </div>
  </div>

  <script>
    function toggleDaysInput() {
      const type = document.getElementById('key-type').value;
      document.getElementById('days-group').style.display = type === 'trial' ? 'block' : 'none';
    }
    toggleDaysInput();
  </script>
  <script src="/js/admin.js"></script>
</body>
</html>
