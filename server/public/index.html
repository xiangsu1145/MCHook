<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCHook - Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <h1>MCHook</h1>
    <div class="tabs">
      <button class="tab active" data-tab="login">Login</button>
      <button class="tab" data-tab="register">Register</button>
    </div>

    <div id="login-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="login-username" placeholder="Enter username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter password">
      </div>
      <button onclick="login()">Login</button>
      <div id="login-error" class="error hidden"></div>
    </div>

    <div id="register-form" class="hidden">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="Enter username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Enter password">
      </div>
      <div class="form-group">
        <label>License Key</label>
        <input type="text" id="reg-key" placeholder="Enter license key">
      </div>
      <button onclick="register()">Register</button>
      <div id="reg-error" class="error hidden"></div>
      <div id="reg-success" class="success hidden"></div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
